<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Munch Hub - Admin Authentication</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="css/style.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .auth-container {
            max-width: 450px;
            width: 90%;
        }
        .auth-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            padding: 3rem;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Brand -->
        <div class="text-center mb-4 text-white">
            <h1 class="fw-bold d-flex align-items-center justify-content-center gap-2 text-primary">
                <i class="fa-solid fa-pizza-slice text-secondary"></i> MunchHub
            </h1>
            <p class="text-white-50">Canteen Staff & Admin Portal</p>
        </div>

        <div class="card auth-card">
            <h3 class="fw-bold mb-2 text-center text-white">Canteen Staff Login</h3>
            <p class="text-white-50 small text-center mb-4">Authenticate to manage canteens, dispatch queues, and update menu prices.</p>

            <form id="adminLoginForm">
                <!-- Email Field -->
                <div class="mb-3">
                    <label class="form-label small text-white-50 fw-semibold">ADMIN EMAIL</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-white-50 border-secondary"><i class="fa-solid fa-user-shield"></i></span>
                        <input type="email" id="adminEmail" class="form-control border-start-0 munch-input bg-transparent border-secondary text-white w-75" placeholder="staff@munchhub.com" required>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="mb-4">
                    <label class="form-label small text-white-50 fw-semibold">ACCESS SECURITY KEY</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-white-50 border-secondary"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="adminPassword" class="form-control border-start-0 border-end-0 munch-input bg-transparent border-secondary text-white" placeholder="••••••••" required style="border-top-right-radius: 0; border-bottom-right-radius: 0;">
                        <span class="input-group-text bg-transparent border-start-0 text-white-50 border-secondary cursor-pointer" id="togglePasswordBtn" style="border-top-right-radius: 12px; border-bottom-right-radius: 12px; transition: var(--transition-smooth);"><i class="fa-solid fa-eye"></i></span>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="munch-btn munch-btn-primary w-100 py-3 mb-3">
                    Authenticate Session <i class="fa-solid fa-shield-halved ms-2"></i>
                </button>
            </form>

            <p class="text-center small text-white-50 mb-0">
                Are you a student? <a href="login.html" class="text-primary fw-bold text-decoration-none">Go to Student Login</a>
            </p>
        </div>
    </div>

    <!-- Bootstrap & JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/daa-algorithms.js"></script>
    <script src="js/main.js"></script>

    <script>
        // Toggle Password Visibility
        const togglePasswordBtn = document.getElementById("togglePasswordBtn");
        const passwordField = document.getElementById("adminPassword");
        
        togglePasswordBtn.addEventListener("click", () => {
            const type = passwordField.getAttribute("type") === "password" ? "text" : "password";
            passwordField.setAttribute("type", type);
            
            // Toggle eye icon
            const icon = togglePasswordBtn.querySelector("i");
            if (type === "password") {
                icon.className = "fa-solid fa-eye";
            } else {
                icon.className = "fa-solid fa-eye-slash";
            }
        });

        document.getElementById("adminLoginForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const email = document.getElementById("adminEmail").value.trim();
            const password = document.getElementById("adminPassword").value.trim();

            // Read dynamic credentials from localStorage, falling back to defaults if not found
            let storedAdmin = null;
            try {
                storedAdmin = JSON.parse(localStorage.getItem("munch_admin"));
            } catch(err) {
                console.error("Failed to parse munch_admin from localStorage", err);
            }

            // Auto-heal old admin configurations that have no password or have the old email
            if (storedAdmin && (!storedAdmin.password || storedAdmin.email === "admin@munchhub.edu")) {
                storedAdmin.email = "staff@munchhub.com";
                storedAdmin.password = "MunchAdminSecretPass2026!";
                localStorage.setItem("munch_admin", JSON.stringify(storedAdmin));
            }

            const targetEmail = storedAdmin && storedAdmin.email ? storedAdmin.email : "staff@munchhub.com";
            const targetPassword = storedAdmin && storedAdmin.password ? storedAdmin.password : "MunchAdminSecretPass2026!";

            // Dynamic Validation
            if (email === targetEmail && password === targetPassword) {
                sessionStorage.setItem("munch_admin_session", "active");
                showToast("Admin session authenticated successfully!");
                setTimeout(() => {
                    window.location.href = "admin-dashboard.html";
                }, 1000);
            } else {
                showToast("Invalid credentials! Please try again.", "error");
            }
        });
    </script>
</body>
</html>
