<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Munch Hub - Sign In</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="css/style.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .auth-container {
            max-width: 450px;
            width: 90%;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(12px);
            padding: 3rem;
            transition: var(--transition-smooth);
        }
        [data-theme="dark"] .auth-card {
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Brand Title -->
        <div class="text-center mb-4 text-white">
            <h1 class="fw-bold d-flex align-items-center justify-content-center gap-2">
                <i class="fa-solid fa-pizza-slice"></i> MunchHub
            </h1>
            <p class="text-white-50">Smart Student Dining Portal</p>
        </div>

        <div class="card auth-card">
            <h3 class="fw-bold mb-3 text-center">Welcome Back!</h3>
            <p class="text-secondary small text-center mb-4">Log in to optimize your meals & order quickly.</p>

            <form id="loginForm">
                <!-- Email Field -->
                <div class="mb-3">
                    <label class="form-label small text-secondary fw-semibold">COLLEGE EMAIL</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="email" class="form-control border-start-0 munch-input w-75" placeholder="student@college.edu" required>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="mb-3">
                    <label class="form-label small text-secondary fw-semibold">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="password" class="form-control border-start-0 border-end-0 munch-input" placeholder="••••••••" required style="border-top-right-radius: 0; border-bottom-right-radius: 0;">
                        <span class="input-group-text bg-transparent border-start-0 text-muted cursor-pointer" id="togglePasswordBtn" style="border-top-right-radius: 12px; border-bottom-right-radius: 12px; transition: var(--transition-smooth);"><i class="fa-solid fa-eye"></i></span>
                    </div>
                </div>

                <!-- Remember Me & Forgot -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small text-secondary" for="rememberMe">Remember me</label>
                    </div>
                    <a href="#" class="small text-primary text-decoration-none">Forgot password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="munch-btn munch-btn-primary w-100 py-3 mb-3">
                    Sign In <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                </button>
            </form>

            <!-- Links to Register and Admin -->
            <p class="text-center small text-secondary mb-0">
                Don't have an account? <a href="register.html" class="text-primary fw-bold text-decoration-none">Register here</a>
            </p>
            
            <div class="text-center mt-4 pt-3 border-top border-light-subtle">
                <a href="admin-login.html" class="small text-muted text-decoration-none"><i class="fa-solid fa-user-shield"></i> Are you a Canteen Administrator?</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap & JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/daa-algorithms.js"></script>
    <script src="js/main.js"></script>

    <script>
        // Toggle Password Visibility
        const togglePasswordBtn = document.getElementById("togglePasswordBtn");
        const passwordField = document.getElementById("password");
        
        togglePasswordBtn.addEventListener("click", () => {
            const type = passwordField.getAttribute("type") === "password" ? "text" : "password";
            passwordField.setAttribute("type", type);
            
            // Toggle eye icon
            const icon = togglePasswordBtn.querySelector("i");
            if (type === "password") {
                icon.className = "fa-solid fa-eye";
            } else {
                icon.className = "fa-solid fa-eye-slash";
            }
        });

        document.getElementById("loginForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const emailInput = document.getElementById("email").value;
            const passwordInput = document.getElementById("password").value;

            // Simulating authentic checking
            if(emailInput.includes("@")) {
                let user = JSON.parse(localStorage.getItem("munch_user")) || {};
                
                // If it's a new or default user, we save their input email
                user.email = emailInput;
                if (!user.name) user.name = "Rahul Verma";
                if (!user.college) user.college = "National Institute of Technology";
                
                localStorage.setItem("munch_user", JSON.stringify(user));
                
                showToast("Login Successful! Welcome to MunchHub.");
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);
            } else {
                showToast("Please enter a valid college email.", "error");
            }
        });
    </script>
</body>
</html>
