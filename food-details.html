<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Munch Hub - Food Details</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="dashboard-sidebar d-flex flex-column justify-content-between">
            <div>
                <!-- Brand Title -->
                <a href="index.html" class="d-flex align-items-center gap-2 fw-bold text-primary text-decoration-none mb-4" style="font-size: 1.5rem;">
                    <i class="fa-solid fa-pizza-slice text-secondary"></i> MunchHub
                </a>
                
                <!-- Profile Indicator -->
                <div class="d-flex align-items-center gap-3 p-3 glass-card mb-4">
                    <div class="profile-avatar-circle rounded-circle shadow d-flex align-items-center justify-content-center bg-primary text-white fw-bold" style="width: 45px; height: 45px; min-width: 45px; font-size: 1.1rem; text-shadow: 0 1px 2px rgba(0,0,0,0.2);">U</div>
                    <div class="overflow-hidden">
                        <h6 class="mb-0 fw-bold text-truncate profile-welcome-name">Munch User</h6>
                        <span class="text-muted small text-truncate d-block profile-welcome-college">NIT Campus</span>
                    </div>
                </div>

                <!-- Menu Links -->
                <ul class="sidebar-menu">
                    <li class="sidebar-item">
                        <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                    </li>
                    <li class="sidebar-item">
                        <a href="budget-meals.html" class="sidebar-link"><i class="fa-solid fa-wallet"></i> Budget Meals</a>
                    </li>
                    <li class="sidebar-item">
                        <a href="trending.html" class="sidebar-link"><i class="fa-solid fa-fire text-danger"></i> Trending Foods</a>
                    </li>
                    <li class="sidebar-item">
                        <a href="group-order.html" class="sidebar-link"><i class="fa-solid fa-people-group"></i> Group Orders</a>
                    </li>
                    <li class="sidebar-item">
                        <a href="profile.html" class="sidebar-link"><i class="fa-solid fa-user"></i> Profile</a>
                    </li>
                    <li class="sidebar-item">
                        <a href="cart.html" class="sidebar-link active position-relative">
                            <i class="fa-solid fa-cart-shopping"></i> My Cart
                            <span class="position-absolute end-0 me-3 translate-middle-y badge rounded-pill bg-danger cart-count-badge font-weight-bold" style="font-size: 0.65rem; top: 50%;">0</span>
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Logout Bottom -->
            <div>
                <hr class="border-secondary">
                <a href="index.html" class="sidebar-link text-danger fw-semibold" onclick="localStorage.removeItem('munch_cart')"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Back Button -->
            <div class="mb-4">
                <button class="munch-btn munch-btn-outline py-2 px-3 small border-light-subtle text-secondary" onclick="window.history.back()">
                    <i class="fa-solid fa-circle-left me-2"></i> Back to Previous
                </button>
            </div>

            <!-- Detailed Grid -->
            <div class="row g-5 mb-5" id="food-detail-container">
                <!-- Details injected dynamically -->
            </div>

            <!-- Related Food Suggestions Section -->
            <div>
                <h4 class="fw-bold mb-4"><i class="fa-solid fa-lightbulb text-primary"></i> You Might Also Like</h4>
                <div class="row g-4" id="related-suggestions-row">
                    <!-- Related cards loaded dynamically -->
                </div>
            </div>
        </main>
    </div>

    <!-- Bootstrap & JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/daa-algorithms.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const foodId = parseInt(getUrlParam("id"));
            if (!foodId) {
                document.getElementById("food-detail-container").innerHTML = `<div class="col-12 py-5 text-center text-muted"><h4>Error: Food Item ID is missing or invalid.</h4></div>`;
                return;
            }

            const foods = JSON.parse(localStorage.getItem("munch_foods")) || [];
            const restaurants = JSON.parse(localStorage.getItem("munch_restaurants")) || [];

            const food = foods.find(f => f.id === foodId);
            if (!food) {
                document.getElementById("food-detail-container").innerHTML = `<div class="col-12 py-5 text-center text-muted"><h4>Error: Food item was not found in active database.</h4></div>`;
                return;
            }

            const rest = restaurants.find(r => r.id === food.restaurantId) || { name: "Munch Partner", rating: 4.5 };

            // Render Core Details Page
            const detailsRow = document.getElementById("food-detail-container");
            detailsRow.innerHTML = `
                <div class="col-md-5">
                    <img src="${food.image}" class="img-fluid rounded-4 shadow hover-scale w-100" style="max-height: 380px; object-fit: cover;">
                </div>
                <div class="col-md-7 d-flex flex-column justify-content-between">
                    <div>
                        <span class="badge munch-badge badge-glow-primary mb-2">${food.category}</span>
                        <h1 class="fw-bold mb-2">${food.name}</h1>
                        
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <span class="text-warning fw-bold fs-5"><i class="fa-solid fa-star"></i> ${food.rating}</span>
                            <span class="text-muted small">|</span>
                            <span class="text-secondary small cursor-pointer hover-scale restaurant-redirect-link" data-restaurant-id="${food.restaurantId}">
                                <i class="fa-solid fa-store text-primary me-1"></i> <strong>${rest.name}</strong>
                            </span>
                        </div>

                        <p class="lead text-secondary mb-4">${food.description}</p>
                        
                        <div class="p-3 bg-light rounded-3 border mb-4 d-inline-flex gap-4">
                            <div>
                                <span class="text-muted small d-block">Price per portion</span>
                                <h3 class="fw-bold text-primary mb-0">₹${food.price}</h3>
                            </div>
                            <div class="border-end border-light-subtle"></div>
                            <div>
                                <span class="text-muted small d-block">Energy content</span>
                                <h3 class="fw-bold text-dark mb-0">${food.calories || 350} <span class="small font-weight-normal text-muted">kcal</span></h3>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="d-flex align-items-center gap-3 mb-4">
                            <span class="fw-bold small text-secondary">QUANTITY Selector:</span>
                            <div class="input-group" style="width: 130px; height: 42px;">
                                <button class="btn btn-outline-secondary border-light-subtle rounded-start-3" type="button" id="qtyMinus"><i class="fa-solid fa-minus"></i></button>
                                <input type="text" class="form-control text-center font-weight-bold" id="qtyVal" value="1" readonly>
                                <button class="btn btn-outline-secondary border-light-subtle rounded-end-3" type="button" id="qtyPlus"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>

                        <button id="addSpecificBtn" class="munch-btn munch-btn-primary py-3 px-5 fs-5">
                            <i class="fa-solid fa-cart-plus me-2"></i> Add to Cart
                        </button>
                    </div>
                </div>
            `;

            // Setup Qty Selectors
            const valInput = document.getElementById("qtyVal");
            document.getElementById("qtyMinus").addEventListener("click", () => {
                let current = parseInt(valInput.value);
                if (current > 1) valInput.value = current - 1;
            });
            document.getElementById("qtyPlus").addEventListener("click", () => {
                let current = parseInt(valInput.value);
                valInput.value = current + 1;
            });

            // Setup Add specific button click
            document.getElementById("addSpecificBtn").addEventListener("click", () => {
                const qty = parseInt(valInput.value);
                CartManager.add(food.id, qty);
            });

            // 4. Render Related Suggestions Row
            const relatedRow = document.getElementById("related-suggestions-row");
            const relatedFoods = foods.filter(f => f.category === food.category && f.id !== food.id);
            
            if (relatedRow && relatedFoods.length > 0) {
                relatedRow.innerHTML = "";
                relatedFoods.slice(0, 3).forEach(relFood => {
                    const colDiv = document.createElement("div");
                    colDiv.className = "col-md-4 col-sm-6";
                    colDiv.innerHTML = createFoodCardHTML(relFood);
                    relatedRow.appendChild(colDiv);
                });
            } else {
                relatedRow.innerHTML = `<div class="col-12 py-3 text-muted text-center"><p class="small">No other items in this category currently available.</p></div>`;
            }

        });
    </script>
</body>
</html>
