<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Munch Hub - Trending Foods</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="dashboard-sidebar d-flex flex-column justify-content-between">
            <div>
                <!-- Brand Title -->
                <a href="index.html" class="d-flex align-items-center gap-2 fw-bold text-primary text-decoration-none mb-4" style="font-size: 1.5rem;">
                    <i class="fa-solid fa-pizza-slice text-secondary"></i> MunchHub
                </a>
                
                <!-- Profile Indicator -->
                <div class="d-flex align-items-center gap-3 p-3 glass-card mb-4">
                    <div class="profile-avatar-circle rounded-circle shadow d-flex align-items-center justify-content-center bg-primary text-white fw-bold" style="width: 45px; height: 45px; min-width: 45px; font-size: 1.1rem; text-shadow: 0 1px 2px rgba(0,0,0,0.2);">U</div>
                    <div class="overflow-hidden">
                        <h6 class="mb-0 fw-bold text-truncate profile-welcome-name">Munch User</h6>
                        <span class="text-muted small text-truncate d-block profile-welcome-college">NIT Campus</span>
                    </div>
                </div>

                <!-- Menu Links -->
                <ul class="sidebar-menu">
                    <li class="sidebar-item">
                        <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                    </li>
                    <li class="sidebar-item">
                        <a href="budget-meals.html" class="sidebar-link"><i class="fa-solid fa-wallet"></i> Budget Meals</a>
                    </li>
                    <li class="sidebar-item">
                        <a href="trending.html" class="sidebar-link active"><i class="fa-solid fa-fire text-danger"></i> Trending Foods</a>
                    </li>
                    <li class="sidebar-item">
                        <a href="group-order.html" class="sidebar-link"><i class="fa-solid fa-people-group"></i> Group Orders</a>
                    </li>
                    <li class="sidebar-item">
                        <a href="profile.html" class="sidebar-link"><i class="fa-solid fa-user"></i> Profile</a>
                    </li>
                    <li class="sidebar-item">
                        <a href="cart.html" class="sidebar-link position-relative">
                            <i class="fa-solid fa-cart-shopping"></i> My Cart
                            <span class="position-absolute end-0 me-3 translate-middle-y badge rounded-pill bg-danger cart-count-badge font-weight-bold" style="font-size: 0.65rem; top: 50%;">0</span>
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Logout Bottom -->
            <div>
                <hr class="border-secondary">
                <a href="index.html" class="sidebar-link text-danger fw-semibold" onclick="localStorage.removeItem('munch_cart')"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-start mb-5 flex-wrap gap-3">
                <div>
                    <span class="badge munch-badge badge-glow-secondary mb-2"><i class="fa-solid fa-fire"></i> Campus Heat Feed</span>
                    <h2 class="fw-bold mb-1">Most Ordered & Trending Foods 🔥</h2>
                    <p class="text-secondary mb-0">Dynamic real-time ranking of popular student food orders across all cafes.</p>
                </div>
                
                <!-- Sort Actions Panel -->
                <div class="d-flex align-items-center gap-3 bg-white p-3 rounded-4 shadow-sm border border-light-subtle">
                    <span class="small text-secondary fw-semibold text-nowrap"><i class="fa-solid fa-arrow-down-short-wide text-primary"></i> SORT BY:</span>
                    <select class="form-select munch-input py-1 px-3 border-0 small font-weight-bold cursor-pointer" id="sortField" style="width: 140px; outline:none; box-shadow:none;">
                        <option value="popularity">Popularity</option>
                        <option value="rating">Top Rated</option>
                        <option value="price">Price</option>
                    </select>
                </div>
            </div>



            <!-- Trending Food Cards Grid -->
            <div class="row g-4" id="trending-grid">
                <!-- Cards loaded dynamically -->
            </div>
        </main>
    </div>

    <!-- Bootstrap & JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/daa-algorithms.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const foods = JSON.parse(localStorage.getItem("munch_foods")) || [];
            
            function sortAndRenderFoods() {
                const sortField = document.getElementById("sortField").value;
                
                // Determine order direction (price ascending, others descending)
                const ascending = sortField === 'price';
                
                // Call standard merge sort helper
                const sortedList = mergeSort(foods, sortField, ascending);

                const grid = document.getElementById("trending-grid");
                if (!grid) return;
                grid.innerHTML = "";

                sortedList.forEach(food => {
                    const colDiv = document.createElement("div");
                    colDiv.className = "col-md-6 col-lg-4";
                    
                    // Highlight the visual tag values
                    let tagText = "";
                    if (sortField === 'popularity') tagText = `<i class="fa-solid fa-users"></i> ${food.popularity} orders`;
                    else if (sortField === 'rating') tagText = `<i class="fa-solid fa-star text-warning"></i> ${food.rating} rating`;
                    else tagText = `₹${food.price}`;

                    colDiv.innerHTML = createFoodCardHTML(food);
                    
                    // Append dynamic badge to footer of card content
                    const badgeContainer = colDiv.querySelector(".d-flex.justify-content-between");
                    if (badgeContainer) {
                        const scoreSpan = document.createElement("span");
                        scoreSpan.className = "badge bg-dark rounded-pill py-2 px-3 small";
                        scoreSpan.innerHTML = tagText;
                        badgeContainer.appendChild(scoreSpan);
                    }

                    grid.appendChild(colDiv);
                });

                // Apply dynamic visibility filters immediately
                if (typeof applyVegFilterVisibility === "function") {
                    applyVegFilterVisibility();
                }
            }

            // Expose globally for top-bar filter triggers
            window.renderMenuPage = sortAndRenderFoods;

            // Initial render
            sortAndRenderFoods();

            // Listeners
            document.getElementById("sortField").addEventListener("change", sortAndRenderFoods);
        });
    </script>
</body>
</html>
